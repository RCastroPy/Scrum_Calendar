services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-scrum_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scrum_pass}
      POSTGRES_DB: ${DB_NAME:-scrum_calendar}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${DB_USER:-scrum_user}:${DB_PASSWORD:-scrum_pass}@db:5432/${DB_NAME:-scrum_calendar}}
      APP_ENV: ${APP_ENV:-development}
      CORS_ORIGINS_RAW: ${CORS_ORIGINS_RAW:-http://localhost:8000}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      PBKDF2_ROUNDS: ${PBKDF2_ROUNDS:-600000}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      DISABLE_DOCS_IN_PRODUCTION: ${DISABLE_DOCS_IN_PRODUCTION:-true}
      LOGIN_RATE_LIMIT_ENABLED: ${LOGIN_RATE_LIMIT_ENABLED:-true}
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-8}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-900}
      LOGIN_RATE_LIMIT_BLOCK_SECONDS: ${LOGIN_RATE_LIMIT_BLOCK_SECONDS:-900}
      SECURITY_AUDIT_LOG_ENABLED: ${SECURITY_AUDIT_LOG_ENABLED:-true}
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend:delegated
      - ./ScrumV2/dist:/app/ScrumV2/dist:delegated
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  db_data:
